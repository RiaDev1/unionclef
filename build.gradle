buildscript {
    def (major, minor, patch) = project.name.split("-")[0].tokenize('.')
    project.ext.mcVersion = "${major}${minor.padLeft(2, '0')}${(patch ?: '').padLeft(2, '0')}" as int

    dependencies {
        classpath 'fabric-loom:fabric-loom.gradle.plugin:1.15.5'
        classpath 'com.github.breadmoirai:github-release:2.5.2'
    }
}

plugins {
    id "maven-publish"
    id 'com.gradleup.shadow' version '9.4.0'
}

apply plugin: 'fabric-loom'
apply plugin: 'com.replaymod.preprocess'

loom {
    runs {
        client {
            environment = "client"
        }
        server {
            environment = "server"
        }
    }
}

preprocess {
    patternAnnotation.set("adris.altoclef.multiversion.Pattern")
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

// Tungsten is now a standalone mod (1.21.11-primary source, own build.gradle).
// No longer compiled inline via srcDir — imported as dependency instead.

tasks.withType(JavaCompile).configureEach {
    options.release = 21
    options.encoding = "UTF-8"
}

base {
    archivesName = project.archives_base_name
}
version = "${project.name}-${project.mod_version}"
group = project.maven_group

// ── Per-version mappings ────────────────────────────────────────────────────

def mappingsVersions = [
        12100: "1.21+build.9",
        12101: "1.21.1+build.3",
        12111: "1.21.11+build.3",
]

def fabricApiVersions = [
        12100: "0.100.7+1.21",
        12101: "0.116.9+1.21.1",
        12111: "0.140.0+1.21.11",
]

def loaderVersions = [
        12100: project.loader_version,
        12101: project.loader_version,
        12111: "0.18.3",
]

// ── Repositories ────────────────────────────────────────────────────────────

repositories {
    mavenCentral()
    maven {
        name = 'babbaj-repo'
        url = 'https://babbaj.github.io/maven/'
    }
    maven {
        name = 'maxhenkel-repo'
        url = 'https://maven.maxhenkel.de/repository/public'
    }
}

// ── Dependencies ────────────────────────────────────────────────────────────

dependencies {
    minecraft("com.mojang:minecraft:${project.name}")
    mappings("net.fabricmc:yarn:${mappingsVersions[mcVersion]}:v2")
    modImplementation("net.fabricmc:fabric-loader:${loaderVersions[mcVersion] ?: project.loader_version}")
    include(implementation(annotationProcessor("io.github.llamalad7:mixinextras-fabric:0.3.5")))

    modImplementation("net.fabricmc.fabric-api:fabric-api:${fabricApiVersions[mcVersion]}")
    modRuntimeOnly("net.fabricmc:fabric-language-kotlin:1.13.2+kotlin.2.1.20")

    // Jackson JSON
    implementation 'com.fasterxml.jackson.core:jackson-core:2.17.2'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.17.2'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'

    // Nether pathfinder
    implementation 'dev.babbaj:nether-pathfinder:1.5'
    include 'dev.babbaj:nether-pathfinder:1.5'

    // Voice chat API (compile-time only)
    compileOnly 'de.maxhenkel.voicechat:voicechat-api:2.6.0'

    // Py4j (Python bridge)
    implementation 'net.sf.py4j:py4j:0.10.9.7'
    shadow('net.sf.py4j:py4j:0.10.9.7')
    shadow('com.fasterxml.jackson.core:jackson-core:2.17.2')
    shadow('com.fasterxml.jackson.core:jackson-annotations:2.17.2')
    shadow('com.fasterxml.jackson.core:jackson-databind:2.17.2')

    // Shredder — new pathfinder (replaces baritone, same package names)
    implementation project(path: ":shredder", configuration: "namedElements")
    include project(":shredder")

    // Tungsten — standalone mod (1.21.11 mappings, own mixins + entrypoint)
    implementation project(path: ":tungsten", configuration: "namedElements")
    include project(":tungsten")
}

// ── Build pipeline ──────────────────────────────────────────────────────────

shadowJar {
    configurations = [project.configurations.shadow]
}

remapJar {
    dependsOn("shadowJar")
    input.set(shadowJar.archiveFile)
}

processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    inputs.property("version", project.version)
    inputs.property("mcVersion", project.name)

    filesMatching("fabric.mod.json") {
        expand "version": project.version,
                "mcVersion": project.name
    }

    from(sourceSets.main.resources.srcDirs) {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        exclude "fabric.mod.json"
    }

    // Tungsten mixin config — include only the mixins json, not fabric.mod.json/assets
    from(rootProject.file('tungsten/src/main/resources')) {
        include 'tungsten.mixins.json'
    }
}

task sourcesJar(type: Jar, dependsOn: classes) {
    from sourceSets.main.allSource
}

jar {
    from "LICENSE"
}

// ── Chat parser test (no MC runtime needed) ─────────────────────────────────
task testChatParser(type: JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'adris.altoclef.butler.ChatParserTest'
    jvmArgs '-Dlog4j2.disable.jmx=true'
}

// ── Publishing ──────────────────────────────────────────────────────────────

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact(remapJar) { builtBy remapJar }
            artifact(sourcesJar) { builtBy remapSourcesJar }
        }
    }
}

// ── GitHub Release (primary version only) ───────────────────────────────────

// ── GitHub Release (stable + pre-release) ──────────────────────────────────
// gradlew githubRelease      → stable release (v0.21.0)
// gradlew githubPreRelease   → pre-release    (v0.21.0-alpha)

// Configure on both version subprojects so either can release
if (project.name == "1.21.1" || project.name == "1.21.11") {
    apply plugin: 'com.github.breadmoirai.github-release'

    if (!project.hasProperty('github.token')) {
        logger.warn('github.token not set — GitHub releases will not work.')
        logger.warn('Add  github.token=YOUR_TOKEN  to  ~/.gradle/gradle.properties')
    }

    def releaseAssetFiles = files(
        { remapJar.archiveFile.get().asFile },
        { new File(rootProject.projectDir, "shredder/build/libs/shredder-0.1.0.jar") },
        { new File(rootProject.projectDir, "tungsten/build/libs/tungsten-BETA-1.0.0.jar") },
    )

    def releaseBodyProvider = provider {
        def parts = []
        def baseFile = rootProject.file("docs/releases/base.md")
        if (baseFile.exists()) parts.add(baseFile.text)
        def versionedFile = rootProject.file("docs/releases/${project.mod_version}.md")
        if (versionedFile.exists()) parts.add(versionedFile.text)
        else {
            def latestFile = rootProject.file("docs/releases/latest.md")
            if (latestFile.exists()) parts.add(latestFile.text)
        }
        parts.join("\n---\n\n")
    }

    // Default: stable release. githubPreRelease flips to alpha mode.
    def isPreRelease = project.objects.property(Boolean).convention(false)

    tasks.named('githubRelease') {
        dependsOn 'remapJar', ':shredder:remapJar', ':tungsten:remapJar'
    }

    githubRelease {
        token = project.hasProperty('github.token') ? project.getProperty('github.token') : ""
        owner = "3ndetz"
        repo = "unionclef"
        tagName = provider { isPreRelease.get() ? "v${project.mod_version}-alpha" : "v${project.mod_version}" }
        releaseName = provider { isPreRelease.get() ? "UnionClef v${project.mod_version}-alpha (MC ${project.name})" : "UnionClef v${project.mod_version} (MC ${project.name})" }
        releaseAssets = releaseAssetFiles
        targetCommitish = provider { isPreRelease.get() ? "1.21.11" : "main" }
        generateReleaseNotes = true
        body = releaseBodyProvider
        draft = false
        prerelease = provider { isPreRelease.get() }
        overwrite = true
        dryRun = false
    }

    task githubPreRelease {
        group = 'publishing'
        description = 'Create a GitHub pre-release (alpha) with all mod JARs'
        doFirst {
            isPreRelease.set(true)
        }
        finalizedBy 'githubRelease'
    }
}
